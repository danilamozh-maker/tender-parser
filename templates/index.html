<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тендерный парсер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 700px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .drop-zone {
            border: 3px dashed #cbd5e1;
            padding: 40px;
            text-align: center;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            background: #f8fafc;
        }
        .drop-zone:hover {
            border-color: #667eea;
            background: #f1f5f9;
        }
        .drop-zone.dragover {
            border-color: #667eea;
            background: #e0e7ff;
        }
        .drop-zone p {
            color: #64748b;
            font-size: 16px;
        }
        .drop-zone .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }
        #fileInput { display: none; }
        #fileList {
            margin: 20px 0;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }
        #fileList li {
            list-style: none;
            padding: 10px 15px;
            background: #f1f5f9;
            margin: 5px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .file-name {
            font-weight: 500;
            color: #1e293b;
        }
        .file-size {
            color: #94a3b8;
            font-size: 14px;
            margin-left: 10px;
        }
        .remove-btn {
            color: #ef4444;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 0 5px;
            transition: 0.2s;
        }
        .remove-btn:hover {
            transform: scale(1.2);
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 30px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }
        #status {
            margin-top: 20px;
            padding: 15px 20px;
            border-radius: 12px;
            display: none;
            animation: fadeIn 0.5s;
        }
        #status.loading {
            background: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #status.success {
            background: #dcfce7;
            display: block;
            color: #166534;
        }
        #status.error {
            background: #fee2e2;
            display: block;
            color: #991b1b;
        }
        .spinner {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-text {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Тендерный парсер</h1>
        <p class="subtitle">Загрузите DOCX или TXT файлы для анализа через ИИ</p>
        <div class="drop-zone" id="dropZone">
            <span class="icon">📁</span>
            <p><strong>Нажмите</strong> или <strong>перетащите</strong> файлы сюда</p>
            <p style="font-size:14px;margin-top:5px;color:#94a3b8">Поддерживаются .docx и .txt</p>
            <input type="file" id="fileInput" multiple accept=".docx,.txt">
        </div>
        <ul id="fileList"></ul>
        <button class="btn" id="analyzeBtn" disabled>🔍 Анализировать файлы</button>
        <div id="status"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const statusDiv = document.getElementById('status');
        let files = [];
        
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
            fileInput.value = '';
        });
        
        function handleFiles(fileListObj) {
            let added = 0;
            for (let file of fileListObj) {
                const ext = file.name.split('.').pop().toLowerCase();
                if (ext === 'docx' || ext === 'txt') {
                    files.push(file);
                    added++;
                } else {
                    showStatus(`⚠️ Файл "${file.name}" пропущен (неподдерживаемый формат)`, 'error');
                }
            }
            if (added > 0) {
                renderFileList();
                showStatus(`✅ Добавлено ${added} файлов`, 'success');
                setTimeout(() => { statusDiv.style.display = 'none'; }, 2000);
            }
            analyzeBtn.disabled = files.length === 0;
        }
        
        function renderFileList() {
            fileList.innerHTML = files.map((f, i) => `
                <li>
                    <span>
                        <span class="file-name">📄 ${f.name}</span>
                        <span class="file-size">(${(f.size/1024).toFixed(1)} KB)</span>
                    </span>
                    <button class="remove-btn" onclick="removeFile(${i})">✕</button>
                </li>
            `).join('');
        }
        
        window.removeFile = (index) => {
            files.splice(index, 1);
            renderFileList();
            analyzeBtn.disabled = files.length === 0;
            if (files.length === 0) {
                statusDiv.style.display = 'none';
            }
        };
        
        function showStatus(text, type) {
            statusDiv.className = type;
            statusDiv.textContent = text;
            statusDiv.style.display = 'block';
        }
        analyzeBtn.addEventListener('click', async () => {
            if (files.length === 0) return;
            statusDiv.className = 'loading';
            statusDiv.innerHTML = `
                <div class="spinner"></div>
                <div>
                    <div class="status-text">⏳ Анализируем ${files.length} файлов...</div>
                    <div style="font-size:14px;color:#64748b;margin-top:5px">Это может занять до 2 минут</div>
                </div>
            `;
            statusDiv.style.display = 'flex';
            const formData = new FormData();
            files.forEach(f => formData.append('files', f));
            analyzeBtn.disabled = true;
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                if (response.ok) {
                    const blob = await response.blob();
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `результаты_анализа_${new Date().toISOString().slice(0,10)}.zip`;
                    document.body.appendChild(link);
                    link.click();
                    link.remove();
                    URL.revokeObjectURL(link.href);
                    showStatus('✅ Анализ завершён! ZIP-архив скачан.', 'success');
                    files = [];
                    renderFileList();
                    analyzeBtn.disabled = true;
                } else {
                    const error = await response.text();
                    throw new Error(error || 'Ошибка сервера');
                }
            } catch (error) {
                showStatus(`❌ Ошибка: ${error.message}`, 'error');
            } finally {
                analyzeBtn.disabled = files.length === 0;
                setTimeout(() => {
                    if (statusDiv.className !== 'loading') {
                        setTimeout(() => { statusDiv.style.display = 'none'; }, 4000);
                    }
                }, 1000);
            }
        });
    </script>
</body>
</html>
