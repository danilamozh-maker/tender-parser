<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Купить лицензию</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.1); max-width: 400px; width: 100%; text-align: center; }
        h1 { color: #333; }
        .price { font-size: 24px; font-weight: bold; color: #667eea; margin: 20px 0; }
        .btn { display: block; width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .btn:hover { background: #5a6fd6; }
        #message { margin-top: 20px; font-size: 14px; color: #333; }
        .key-display { background: #f1f5f9; padding: 15px; border-radius: 8px; margin: 15px 0; word-break: break-all; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Тендерный парсер</h1>
        <div class="price">1 месяц — 500 ₽</div>
        <button id="buyBtn" class="btn">💳 Купить лицензию</button>
        <div id="message"></div>
    </div>

    <script>
        document.getElementById('buyBtn').addEventListener('click', async () => {
            const btn = document.getElementById('buyBtn');
            const msg = document.getElementById('message');
            btn.disabled = true;
            btn.textContent = '⏳ Обработка...';
            msg.innerHTML = '';

            try {
                const response = await fetch('/api/create-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                });
                const data = await response.json();
                if (response.ok) {
                    msg.innerHTML = `
                        <div style="margin-top:15px;background:#f1f5f9;padding:15px;border-radius:8px;word-break:break-all;font-family:monospace;font-size:14px;">
                            ✅ Ваш ключ:<br><strong style="color:#667eea;font-size:18px;">${data.license_key}</strong><br>
                            <span style="font-size:13px;color:#475569;">Срок действия: до ${new Date(data.expires_at).toLocaleDateString()}</span>
                        </div>
                        <p style="font-size:13px;color:#475569;margin-top:10px;">Сохраните ключ. Введите его в расширении для активации.</p>
                    `;
                } else {
                    msg.innerHTML = `<div style="color:#ef4444;">❌ Ошибка: ${data.error || 'Неизвестная ошибка'}</div>`;
                }
            } catch (e) {
                msg.innerHTML = `<div style="color:#ef4444;">❌ Ошибка соединения: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = '💳 Купить лицензию';
            }
        });
    </script>
</body>
</html>
